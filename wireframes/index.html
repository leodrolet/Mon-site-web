<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Novio Studio — Wireframes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; height: 100%; background: #e9e3d4; }
  body { font-family: "Space Grotesk", system-ui, sans-serif; }
  /* Canvas chrome */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    padding: 10px 18px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(233,227,212,0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(0,0,0,0.15);
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .topbar .brand { font-family: "Caveat", cursive; font-size: 22px; text-transform: none; letter-spacing: 0; }
  .topbar .meta { color: #555; }
  .topbar .legend { display: flex; gap: 18px; align-items: center; }
  .swatch { display: inline-block; width: 10px; height: 10px; border: 1px solid #000; vertical-align: middle; margin-right: 5px; }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">Novio Studio · wireframes</div>
  <div class="legend">
    <span><span class="swatch" style="background:#f6f3ec"></span>A · Éditorial</span>
    <span><span class="swatch" style="background:#0e0e0e"></span>B · Cinéma</span>
    <span><span class="swatch" style="background:#ffffff"></span>C · Index</span>
    <span><span class="swatch" style="background:#efe6d6"></span>D · Manifeste</span>
  </div>
  <div class="meta">4 directions · pan / zoom · clic pour focus</div>
</div>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="wireframes-shared.jsx"></script>
<script type="text/babel" src="wireframe-a.jsx"></script>
<script type="text/babel" src="wireframe-b.jsx"></script>
<script type="text/babel" src="wireframe-c.jsx"></script>
<script type="text/babel" src="wireframe-d.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
