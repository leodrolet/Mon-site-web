<!DOCTYPE html>
<html lang="fr" data-theme="dark" data-display="instrument" data-density="regular">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Novio Studio — Expériences web pour PME d'Outaouais & Ottawa</title>
<meta name="description" content="Studio web freelance basé à Gatineau. Sites haute-performance livrés en 7 à 28 jours. Dès 999$." />

<!-- Critical fonts (Instrument Serif + Geist + JetBrains Mono) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<!-- Alternate display fonts — deferred, load after page paint -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&display=optional" media="print" onload="this.media='all'" />

<link rel="stylesheet" href="styles.min.css" />
</head>
<body>

<!-- Grain overlay (drawn by JS) -->
<canvas class="grain" id="grain-canvas"></canvas>

<!-- React mount — also the page landmark for screen readers -->
<main id="root"></main>

<!-- React 18 production builds (self-hosted, defer = download in parallel with HTML) -->
<script defer src="react.min.js"></script>
<script defer src="react-dom.min.js"></script>

<!-- Grain canvas (runs inline, before deferred scripts) -->
<script>
(() => {
  const c = document.getElementById('grain-canvas');
  const ctx = c.getContext('2d', { alpha: true });
  const SIZE = 220;
  c.width = SIZE; c.height = SIZE;
  c.style.width = '100vw'; c.style.height = '100vh';
  c.style.imageRendering = 'pixelated';
  const tiles = [];
  for (let k = 0; k < 6; k++) {
    const img = ctx.createImageData(SIZE, SIZE);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = (Math.random() * 255) | 0;
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 255;
    }
    tiles.push(img);
  }
  let idx = 0;
  ctx.putImageData(tiles[0], 0, 0);
  setInterval(() => {
    idx = (idx + 1) % tiles.length;
    ctx.putImageData(tiles[idx], 0, 0);
  }, 110);
})();
</script>

<!-- App bundle (pre-compiled + minified, defer = execute after React) -->
<script defer src="dist/bundle.min.js"></script>
</body>
</html>
